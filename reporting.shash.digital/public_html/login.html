<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Analytics Platform</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 420px;
      padding: 40px;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 8px;
      color: #1f2937;
      text-align: center;
    }

    .subtitle {
      color: #6b7280;
      text-align: center;
      font-size: 0.95rem;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: #374151;
      font-weight: 600;
      font-size: 0.95rem;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 1rem;
      transition: all 0.2s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 10px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    button:active {
      transform: translateY(0);
    }

    .error {
      background: #fee2e2;
      color: #991b1b;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 0.92rem;
      display: none;
    }

    .error.show {
      display: block;
    }

    .info {
      background: #f0f9ff;
      color: #1e40af;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 0.85rem;
      line-height: 1.5;
    }

    .loading {
      display: none;
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    button:disabled .loading {
      display: inline-block;
      margin-right: 6px;
    }

    @media (max-width: 480px) {
      .login-container {
        padding: 28px 20px;
      }

      h1 {
        font-size: 1.5rem;
      }

      .subtitle {
        margin-bottom: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>Analytics Platform</h1>
    <p class="subtitle">Sign in to your account</p>

    <div id="errorMsg" class="error"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          required
          autocomplete="username"
          placeholder="Enter your username"
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          required
          autocomplete="current-password"
          placeholder="Enter your password"
        />
      </div>

      <button type="submit" id="loginBtn">
        <span>Sign In</span>
      </button>
    </form>
  </div>

  <script src="/app.js"></script>
  <script>
    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const loginBtn = document.getElementById('loginBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      loginBtn.disabled = true;
      errorMsg.classList.remove('show');

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const result = await app.login(username, password);
        if (result.ok) {
          window.location.href = '/dashboard.html';
        }
      } catch (error) {
        errorMsg.textContent = error.message || 'Login failed. Please try again.';
        errorMsg.classList.add('show');
        loginBtn.disabled = false;
      }
    });

    // If already logged in, redirect to dashboard
    window.addEventListener('DOMContentLoaded', async () => {
      try {
        const user = await app.getCurrentUser();
        if (user) {
          window.location.href = '/dashboard.html';
        }
      } catch (e) {
        // Not logged in, stay on login page
      }
    });
  </script>

  <noscript>
    <style>
      .error {
        display: block !important;
      }
    </style>
    <div class="error">
      <strong>JavaScript is required</strong><br />
      Please enable JavaScript in your browser to use this application.
    </div>
  </noscript>
</body>
</html>
